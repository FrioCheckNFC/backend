name: Build and deploy Node.js app to Azure Web App - app-friocheck-api-prod-v2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Prepare deployment artifact
        run: |
          mkdir deploy
          cp -r dist deploy/
          cp package.json package-lock.json deploy/
          # Agrega aquí otros archivos de config si los necesitas

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_671E275A8CC44A729D185B86D247293F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9886B16E3A74400095AE30C4043A4659 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_250AC91A5E424E4F87419074A5A3C856 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-friocheck-api-prod-v2'
          slot-name: 'Production'
          package: ./node-app
